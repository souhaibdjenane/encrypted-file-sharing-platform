name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  ci:
    name: Type-check · Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc -b --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npx vitest run

      - name: Security audit
        # Fail on high or critical vulnerabilities only
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build
        env:
          # Needed for the build to resolve the Supabase client without crashing
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

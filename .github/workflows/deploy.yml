name: Deploy

on:
  push:
    branches: [main, crypto-layer]
  workflow_dispatch:

jobs:
  # ── Job 1: Deploy frontend to GitHub Pages ────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed for gh-pages push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          user_name: 'github-actions-bot'
          user_email: 'actions@github.com'

  # ── Job 2: Trigger Vercel Deploy ──────────────────────────────────────────
  deploy-vercel:
    name: Trigger Vercel Deploy Hook
    runs-on: ubuntu-latest
    needs: deploy-frontend   # wait for GitHub Pages deploy to succeed first

    steps:
      - name: Trigger Vercel deploy hook
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"

  # ── Job 3: Deploy Supabase Edge Functions ─────────────────────────────────
  deploy-edge-functions:
    name: Deploy Edge Functions → Supabase
    runs-on: ubuntu-latest
    needs: deploy-frontend   # wait for frontend deploy to succeed first

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Synchronize Secrets
        run: |
          supabase secrets set \
            SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            UPSTASH_REDIS_REST_URL="${{ secrets.UPSTASH_REDIS_REST_URL }}" \
            UPSTASH_REDIS_REST_TOKEN="${{ secrets.UPSTASH_REDIS_REST_TOKEN }}" \
            ALLOWED_ORIGIN="*" 
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push Database Migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy all Edge Functions
        run: |
          supabase functions deploy health           --no-verify-jwt
          supabase functions deploy upload-presign
          supabase functions deploy download-presign --no-verify-jwt
          supabase functions deploy share-file
          supabase functions deploy revoke-access
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

name: Pipeline

on:
  push:
    branches: [main, crypto-layer]
  pull_request:
    branches: [main, crypto-layer]
  workflow_dispatch:

jobs:
  # ── Job 1: Quality Assurance ───────────────────────────────────────────
  qa:
    name: Type-check · Lint · Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc -b --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npx vitest run

  # ── Job 2: Build & Deploy to Vercel (Root) ──────────────────────────────
  deploy-vercel:
    name: Build & Deploy → Vercel
    runs-on: ubuntu-latest
    needs: qa
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for Vercel
        run: npm run build
        env:
          VITE_BASE_PATH: /
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Verify Vercel Credentials
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::VERCEL_TOKEN is not set in GitHub Secrets"
            exit 1
          fi
          echo "VERCEL_TOKEN is present"

      - name: Deploy to Vercel
        run: npx vercel deploy dist --prod --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_1NLBWcGQnv5NsHEDOOZbDeLT
          VERCEL_PROJECT_ID: prj_3Kq6UrnAvMfZTeiFnZwqzOhXl7NG

  # ── Job 3: Build & Deploy to GitHub Pages (Subpath) ─────────────────────
  deploy-gh-pages:
    name: Build & Deploy → GitHub Pages
    runs-on: ubuntu-latest
    needs: qa
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build
        env:
          VITE_BASE_PATH: /encrypted-file-sharing-platform/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          user_name: 'github-actions-bot'
          user_email: 'actions@github.com'

  # ── Job 4: Deploy Edge Functions ─────────────────────────────────────────
  deploy-edge-functions:
    name: Deploy Edge Functions → Supabase
    runs-on: ubuntu-latest
    needs: deploy-vercel   # Ties backend updates to the primary site (Vercel)
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Synchronize Secrets
        run: |
          supabase secrets set \
            SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            UPSTASH_REDIS_REST_URL="${{ secrets.UPSTASH_REDIS_REST_URL }}" \
            UPSTASH_REDIS_REST_TOKEN="${{ secrets.UPSTASH_REDIS_REST_TOKEN }}" \
            ALLOWED_ORIGIN="*" 
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push Database Migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy all Edge Functions
        run: |
          supabase functions deploy health           --no-verify-jwt
          supabase functions deploy upload-presign
          supabase functions deploy download-presign --no-verify-jwt
          supabase functions deploy share-file
          supabase functions deploy revoke-access
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
